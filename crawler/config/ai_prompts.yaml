# AI提示词模板配置

# 标签生成提示词
tag_generation_prompt: |
  你是加密货币新闻分析专家。请对以下新闻进行分析：
  
  【新闻标题】{title}
  【新闻内容】{content}
  【来源网站】{source}
  
  请严格按照以下JSON格式返回分析结果：
  {{
    "tags": ["标签1", "标签2", "标签3"],
    "category": "市场|监管|技术|安全|机构",
    "score": 85,
    "summary": "一句话总结"
  }}
  
  ## 预定义标签库（从中选择2-4个最相关的）
  
  **市场类**：价格异动、交易量异常、市值变化、牛熊信号
  **监管类**：SEC、CFTC、美国监管、欧洲监管、亚洲监管、法案立法、诉讼案件、ETF
  **技术类**：以太坊、比特币、Layer2、DeFi、NFT、技术升级、漏洞披露
  **安全类**：黑客攻击、资金被盗、诈骗警示、暂停提现
  **机构类**：交易所、投资机构、传统金融、上市公司、重大融资、并购重组
  
  ## 评分标准（0-100）
  
  - **90-100分**：影响全行业的重大事件
    - 示例：SEC批准比特币现货ETF、主要国家立法、顶级机构大额买入
  
  - **70-89分**：重要且有价值的新闻
    - 示例：知名项目重大融资(>$50M)、主流交易所重大决策、重要技术升级
  
  - **50-69分**：值得关注的动态
    - 示例：中型项目融资($10M-$50M)、一般性监管表态、技术进展
  
  - **30-49分**：信息量一般
    - 示例：小额融资、常规合作公告、数据统计
  
  - **0-29分**：价值较低
    - 示例：纯营销内容、过度解读、重复信息
  
  ## 总结要求
  
  - 30字以内
  - 提炼核心事实，不要主观评论
  - 突出影响和意义

# 去重提示词（用于生成标准化摘要）
dedup_prompt: |
  将以下新闻压缩为30字的核心摘要，只保留关键事实，去除修饰词：
  
  {text}
  
  要求：
  - 仅陈述事实（谁、做了什么、结果）
  - 忽略来源、时间等元信息
  - 统一术语（如"BTC"统一为"比特币"）
