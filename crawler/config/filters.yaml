# 关键词过滤规则配置 (User Customized)

# 黑名单：命中则丢弃
blacklist:
  patterns:
    # --- 价格波动噪音 ---
    - regex: '^.{0,50}(涨幅|跌幅|24小时|24H).{0,30}[0-9]+(\.[0-9]+)?%'
      reason: "简单价格波动"

  keywords:
    - "分析师"

# 白名单：强制保留（即使命中黑名单）
# 优先级：高于黑名单
whitelist:
  patterns:
    # --- 核心关注人物 ---
    - regex: '(Vitalik|V神|Buterin|Satoshi|中本聪)'
      reason: "核心人物"

length:
  min_chars: 15
  max_chars: 2000

deduplication:
  time_window_hours: 24
  similarity_threshold: 0.55
