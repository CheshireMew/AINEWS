# 关键词过滤配置文件

blacklist:
  # 黑名单关键词（完全过滤掉）
  keywords:
    - "代币空投"
    - "免费领取"
    - "送福利"
    - "KOL发文"
    - "某KOL"
    - "24小时涨幅"
    - "24小时跌幅"
  
  # 黑名单正则表达式
  patterns:
    - regex: "币安.*合约.*倍"
      reason: "合约广告"
    - regex: "现报.*美元"
      reason: "单纯行情播报"
    - regex: "^\\d+小时.*涨.*跌"
      reason: "纯涨跌数据"

whitelist:
  # 白名单关键词（强制保留）
  keywords:
    - "SEC"
    - "ETF"
    - "美国证券交易委员会"
    - "监管"
    - "融资"
    - "收购"
    - "合并"
    - "上线"
    - "主网"
    - "漏洞"
    - "黑客"
    - "被盗"
  
  # 白名单正则表达式
  patterns:
    - regex: "(融资|获投|投资).*万美元"
      reason: "融资新闻"
    - regex: "(SEC|监管|批准|拒绝)"
      reason: "监管动态"
    - regex: "(黑客|被盗|漏洞|攻击)"
      reason: "安全事件"

# 长度限制
length:
  min_chars: 10
  max_chars: 5000
