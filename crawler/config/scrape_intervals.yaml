# 爬取频率配置（单位：分钟）
# 根据历史测试数据生成的推荐值，可手动调整

scrape_intervals:
  # 高频快讯类
  blockbeats: 30      # 测试数据：4.6分钟/条，极高频更新
  
  # 中频综合类
  techflow: 60        # 测试数据：8.9分钟/条，快讯+深度
  foresight: 60       # 估计：类似TechFlow
  marsbit: 60         # 估计：综合资讯，中等频率
  chaincatcher: 60    # 估计：快讯+深度
  panews: 60          # 估计：综合资讯
  
  # 低频深度类
  odaily: 90          # 估计：深度报道为主

# 全局设置
global:
  default_interval: 60    # 默认频率
  min_interval: 15        # 最小间隔限制
  retry_interval: 5       # 出错后重试间隔
  max_retries: 3          # 最大重试次数

# 说明：
# - 数值越小，抓取越频繁
# - 建议根据实际运行1-2天后的数据进行调整
# - 配合本地去重功能，可适当降低频率节省资源
